name: Test formulae

# The formula is generated by the audible-rs release workflow, so nobody reads
# it before it lands. This job does: it installs and tests it on both platforms
# the binaries are built for, on every push and pull request — and on a
# schedule, because a formula can also break without anyone touching it (a
# withdrawn release, a Homebrew change).
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Mondays, 06:00 UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Homebrew is preinstalled on both. macos-14 is Apple Silicon, so the
        # arm64 and the x86_64 archives each get exercised.
        os: [macos-14, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      # `brew install` from a local path is refused — a formula must live in a
      # tap — so register this checkout as the tap it actually is.
      - name: Tap this checkout
        run: |
          set -euo pipefail
          tap_dir="$(brew --repository)/Library/Taps/mkb79/homebrew-tap"
          mkdir -p "$(dirname "$tap_dir")"
          ln -s "$GITHUB_WORKSPACE" "$tap_dir"
          brew tap | grep -q '^mkb79/tap$'

      - name: Install
        run: brew install --verbose mkb79/tap/audible-rs

      - name: Test
        run: brew test --verbose mkb79/tap/audible-rs

      - name: Audit
        run: brew audit --strict --online mkb79/tap/audible-rs
