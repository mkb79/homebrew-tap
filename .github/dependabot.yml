version: 2
updates:
  # The formula pins no dependencies, but the workflow does — a pinned action
  # that is never updated is the one that goes stale unnoticed.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    # The actions are pinned by commit, so Dependabot is the only thing that
    # will ever move them again.
    commit-message:
      prefix: ci
      include: scope
